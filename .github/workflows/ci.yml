name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo check --all-targets --locked

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    env:
      RUST_BACKTRACE: 1
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo test --locked --no-fail-fast

  helper-smoke:
    name: Helper compile + CLI surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: cargo build --release --locked

      - name: Exercise --help on every subcommand
        run: |
          set -euo pipefail
          H=./target/release/stryke-grpc-helper
          $H --help
          $H 127.0.0.1:50051 list --help || true
          $H 127.0.0.1:50051 describe --help || true
          $H 127.0.0.1:50051 call --help || true
          $H --version

      - name: Helper exits non-zero on connection refused
        run: |
          set -euo pipefail
          H=./target/release/stryke-grpc-helper
          ! $H 127.0.0.1:1 --plaintext list >/dev/null 2>&1

  doc:
    name: Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --locked

  release-build:
    name: Release Build (${{ matrix.target }})
    needs: [check, test, helper-smoke]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v6
        with:
          name: stryke-grpc-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/stryke-grpc-helper

  docs-gates:
    name: Docs gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/docs-target-blank-rel-noopener.sh
      - run: bash tests/docs-no-http-links.sh
      - run: bash tests/docs-no-inline-handlers.sh
