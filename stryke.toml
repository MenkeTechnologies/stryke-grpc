[package]
name = "stryke-grpc"
version = "0.19.0"
description = "Generic gRPC client for stryke. Reflection-based service discovery + JSON-in/JSON-out unary and streaming calls. cdylib loaded in-process — persistent tonic channel + descriptor pool cache across calls."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-grpc"
edition = "2026"

[ffi]
lib-name = "stryke_grpc"
namespace = "Grpc"
exports = [
    "grpc__pkg_version",
    "grpc__ping",
    "grpc__list",
    "grpc__describe",
    "grpc__call",
    "grpc__server_stream",
    "grpc__client_stream",
    "grpc__bidi_stream",
    "grpc__status_code",
    "grpc__status_description",
    "grpc__encode_status_message",
    "grpc__decode_status_message",
    "grpc__status_codes",
    "grpc__http_status_for",
    "grpc__grpc_status_for_http",
    "grpc__parse_method",
    "grpc__parse_target",
    "grpc__build_target",
    "grpc__parse_content_type",
    "grpc__build_content_type",
    "grpc__parse_timeout",
    "grpc__build_timeout",
    "grpc__build_method",
    "grpc__is_binary_key",
    "grpc__valid_metadata_key",
    "grpc__normalize_metadata_key",
    "grpc__valid_metadata_value",
    "grpc__encode_bin_value",
    "grpc__encode_metadata_value",
    "grpc__decode_bin_value",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
