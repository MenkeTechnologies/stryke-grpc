[package]
name = "stryke-grpc"
version = "0.2.0"
description = "Generic gRPC client for stryke. Reflection-based service discovery + JSON-in/JSON-out unary calls. cdylib loaded in-process — persistent tonic channel + descriptor pool cache across calls."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-grpc"
edition = "2026"

[ffi]
lib-name = "stryke_grpc"
namespace = "Grpc"
exports = [
    "grpc__pkg_version",
    "grpc__ping",
    "grpc__list",
    "grpc__describe",
    "grpc__call",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
